<section class="about-join">
  <div class="container about-join__container">
    <div class="about-join__inner">
      <div class="about-join__main">
        <div class="about-join__content">
          <h2 class="about-join__title">
            Do you want to work
            <br class="about-join__title-break" />
            in our team?
          </h2>

          <form
            class="about-join__form js-about-join-form"
            action="#"
            method="post"
            novalidate
          >
            <label class="about-join__field">
              <input
                class="about-join__input"
                type="email"
                name="email"
                autocomplete="email"
                required
                placeholder="Email"
              />
            </label>

            <button class="about-join__submit" type="submit">
              <svg
                class="about-join__submit-icon"
                width="17"
                height="13"
                viewBox="0 0 17 13"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path d="M0 6.35358H16" stroke="#515151" />
                <path d="M10 0.353577L16 6.35358L10 12.3536" stroke="#515151" />
              </svg>
            </button>
          </form>
        </div>

        <div class="about-join__info">
          <p class="about-join__text">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aliquam
            ullamcorper eu mauris vitae posuere. Ut at luctus ligula. Nunc ante
            felis, aliquam.
          </p>

          <div class="about-join__contacts">
            <a class="about-join__email" href="mailto:info@hi-light.pl">
              info@hi-light.pl
            </a>

            <ul class="about-join__socials">
              <li>
                <a
                  class="about-join__socials-link"
                  href="#"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  Fb
                </a>
              </li>
              <li>
                <a
                  class="about-join__socials-link"
                  href="#"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  In
                </a>
              </li>
              <li>
                <a
                  class="about-join__socials-link"
                  href="#"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  Be
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <div class="about-join__bottom">
        <p class="about-join__copyright">
          © Copyright 2018. All rights reserved
        </p>

        <div class="about-join__brand-group">
          <p class="about-join__made">Made with love in</p>

          <a class="about-join__brand" href="/" aria-label="The First The Last">
            <svg width="80" height="26">
              <use href="/src/assets/icons/sprite.svg#icon-first_last"></use>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
