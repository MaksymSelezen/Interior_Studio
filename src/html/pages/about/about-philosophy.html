<section class="about-philosophy">
  <div class="container about-philosophy__container">
    <h2 class="about-philosophy__title">Company<br />Philosophy</h2>

    <p class="about-philosophy__text">
      The basic philosophy of our studio is to create individual, aesthetically
      stunning solutions for our customers by lightning-fast development of
      projects employing unique styles and architecture.
    </p>

    <div class="about-philosophy__pagination js-about-philosophy-pagination">
      <button
        class="about-philosophy__arrow js-about-philosophy-prev"
        type="button"
        aria-label="Previous slide"
      >
        <svg class="about-philosophy__arrow-icon" width="4" height="8">
          <use href="/src/assets/icons/sprite.svg#icon-arrow-left"></use>
        </svg>
      </button>

      <span
        class="about-philosophy__pagination-number js-about-philosophy-current"
        >01</span
      >

      <span class="about-philosophy__pagination-progress">
        <span
          class="about-philosophy__pagination-progress-line js-about-philosophy-progress"
        ></span>
      </span>

      <span
        class="about-philosophy__pagination-number js-about-philosophy-total"
        >02</span
      >

      <button
        class="about-philosophy__arrow js-about-philosophy-next"
        type="button"
        aria-label="Next slide"
      >
        <svg class="about-philosophy__arrow-icon" width="4" height="8">
          <use href="/src/assets/icons/sprite.svg#icon-arrow-right"></use>
        </svg>
      </button>
    </div>

    <div class="about-philosophy__slider swiper js-about-philosophy-swiper">
      <div class="about-philosophy__slider-wrapper swiper-wrapper">
        <div class="about-philosophy__slide swiper-slide">
          <img
            class="about-philosophy__image"
            src="/src/assets/images/about/philosophy/about-philosophy-photo1-1440.png"
            alt="Modern kitchen interior"
            loading="lazy"
          />
        </div>

        <div class="about-philosophy__slide swiper-slide">
          <img
            class="about-philosophy__image"
            src="/src/assets/images/about/philosophy/about-philosophy-photo2-1440.png"
            alt="Minimal dining area interior"
            loading="lazy"
          />
        </div>
      </div>
    </div>
  </div>
</section>
