<section class="one-project-hero">
  <div class="one-project-hero__overlay">
    <div class="container one-project-hero__container">
      <div class="one-project-hero__content">
        <h1 class="one-project-hero__title">
          Residence <br class="one-project-hero__title-break" />
          by the lighthouse
        </h1>

        <p class="one-project-hero__text">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aliquam
          ullamcorper eu <br class="one-project-hero__text-break" />
          mauris vitae posuere. Ut at luctus ligula. Nunc ante felis, aliquam eu
          enim sed, ornare pretium velit.
        </p>

        <ul class="one-project-hero__meta">
          <li
            class="one-project-hero__meta-item one-project-hero__meta-item_location"
          >
            <svg class="one-project-hero__meta-icon" width="12" height="16">
              <use href="/src/assets/icons/sprite.svg#icon-location"></use>
            </svg>
            <span class="one-project-hero__meta-text">Lodz, Poland</span>
          </li>

          <li
            class="one-project-hero__meta-item one-project-hero__meta-item_date"
          >
            <svg class="one-project-hero__meta-icon" width="16" height="16">
              <use href="/src/assets/icons/sprite.svg#icon-calendar"></use>
            </svg>
            <span class="one-project-hero__meta-text">16.10.2018</span>
          </li>

          <li
            class="one-project-hero__meta-item one-project-hero__meta-item_area"
          >
            <svg class="one-project-hero__meta-icon" width="16" height="16">
              <use href="/src/assets/icons/sprite.svg#icon-triangle"></use>
            </svg>
            <span class="one-project-hero__meta-text">80 sq.m</span>
          </li>
        </ul>

        <div class="one-project-hero__share">
          {{> partials/ui/share-social}}
        </div>
      </div>
    </div>
  </div>
</section>
