<div class="popup popup-success" id="popup-success">
  <div class="popup__overlay js-popup-overlay"></div>

  <div class="popup__dialog popup-success__dialog">
    <button
      class="popup__close js-popup-close"
      type="button"
      aria-label="Close popup"
    >
      <svg class="popup__close-icon" width="32" height="32" aria-hidden="true">
        <use href="/src/assets/icons/sprite.svg#icon-close"></use>
      </svg>
    </button>

    <div class="popup-success__content">
      <h2 class="popup-success__title">Thank you for your message!</h2>

      <p class="popup-success__text">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aliquam
        ullamcorper eu mauris vitae posuere. Ut at luctus ligula. Nunc ante
        felis, aliquam eu enim sed, ornare pretium velit.
      </p>

      <button class="popup-success__submit js-send-again" type="button">
        Send again
      </button>
    </div>
  </div>
</div>
