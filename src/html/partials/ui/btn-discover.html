<a
  class="btn-discover{{#if class}} {{class}}{{/if}}"
  href="{{#if href}}{{BASE_URL}}{{href}}{{else}}#{{/if}}"
>
  <span class="btn-discover__line"></span>
  <span class="btn-discover__label"
    >{{#if text}}{{text}}{{else}}Discover more{{/if}}</span
  >
  <span class="btn-discover__line"></span>
</a>
